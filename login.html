<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – DMless</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height:100vh;
            background: #0b0f1c;
            display: flex;
            align-items: center;
            justify-content: center;
            padding:20px;
        }
        .login-card {
            background: rgba(30,41,59,0.5);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(139,92,246,0.3);
        }
        .logo {
            font-size:32px; font-weight:700;
            background: linear-gradient(135deg, #c084fc, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align:center; margin-bottom:12px;
        }
        h2 { color:#f1f5f9; font-weight:600; font-size:28px; text-align:center; margin-bottom:8px; }
        .sub { color:#94a3b8; text-align:center; margin-bottom:32px; }
        .form-group { margin-bottom:24px; }
        label { display:block; color:#cbd5e1; font-size:14px; font-weight:500; margin-bottom:8px; }
        input {
            width:100%; padding:14px 18px;
            background: rgba(15,23,42,0.6);
            border:1px solid #334155; border-radius:16px;
            color:white; font-size:16px;
        }
        input:focus { outline:none; border-color:#8b5cf6; box-shadow:0 0 0 3px rgba(139,92,246,0.2); }
        .btn {
            width:100%; padding:14px;
            background: linear-gradient(135deg, #8b5cf6, #c084fc);
            border:none; border-radius:40px;
            color:white; font-weight:600; font-size:18px;
            cursor:pointer; transition:0.2s;
            box-shadow:0 8px 20px rgba(139,92,246,0.3);
        }
        .btn:hover {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            transform:translateY(-2px);
            box-shadow:0 12px 28px rgba(139,92,246,0.5);
        }
        .flash-message {
            background: rgba(239,68,68,0.2); border:1px solid #ef4444;
            border-radius:16px; padding:12px; margin-bottom:25px;
            color:#fff; text-align:center;
        }
        .footer { text-align:center; margin-top:25px; color:#94a3b8; }
        .footer a { color:#c084fc; text-decoration:none; }
        .footer a:hover { text-decoration:underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">DMless</div>
        <h2>Welcome back</h2>
        <div class="sub">Sign in to your recruiter account</div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for message in messages %}<div class="flash-message">{{ message }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="you@company.com" required></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
            <button type="submit" class="btn">Log in</button>
        </form>
        <div class="footer">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></div>
    </div>
</body>
</html>
