<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume – DMless</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0f1c;
            min-height:100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding:20px;
        }
        .upload-card {
            background: rgba(30,41,59,0.5);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 50px 45px;
            max-width: 550px;
            width: 100%;
            border: 1px solid rgba(139,92,246,0.3);
            text-align: center;
        }
        h2 {
            font-size:32px; font-weight:700;
            background: linear-gradient(135deg, #c084fc, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom:12px;
        }
        p { color:#94a3b8; margin-bottom:35px; font-size:17px; }
        .upload-icon { font-size:48px; margin-bottom:20px; }
        .form-group { margin-bottom:30px; text-align:left; }
        label { display:block; font-weight:600; color:#cbd5e1; margin-bottom:12px; }
        input[type="file"] {
            width:100%; padding:20px;
            background: rgba(15,23,42,0.6);
            border:2px dashed #334155; border-radius:30px;
            color:#e2e8f0; cursor:pointer;
        }
        input[type="file"]:hover { border-color:#8b5cf6; background:rgba(139,92,246,0.1); }
        .btn {
            background: linear-gradient(135deg, #8b5cf6, #c084fc);
            color:white; border:none; padding:16px 40px;
            border-radius:40px; font-weight:600; font-size:18px;
            width:100%; cursor:pointer; transition:0.2s;
            box-shadow:0 8px 20px rgba(139,92,246,0.3);
        }
        .btn:hover {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            transform:translateY(-2px);
            box-shadow:0 15px 25px rgba(139,92,246,0.5);
        }
        .flash-message {
            background: rgba(239,68,68,0.2); border:1px solid #ef4444;
            border-radius:30px; padding:14px; margin-bottom:25px; color:#fff;
        }
    </style>
</head>
<body>
    <div class="upload-card">
        <div class="upload-icon">📎</div>
        <h2>Upload your resume</h2>
        <p>You passed the knockout questions! Please upload your resume (PDF, DOC, DOCX).</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for message in messages %}<div class="flash-message">{{ message }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group"><label>Choose file</label><input type="file" name="resume" accept=".pdf,.doc,.docx" required></div>
            <button type="submit" class="btn">Upload resume</button>
        </form>
    </div>
</body>
</html>
