<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for {{ job.role }} – DMless</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0f1c;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .apply-card {
            max-width: 900px;
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 50px;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .company-tag { color: #94a3b8; margin-bottom: 25px; }
        .desc {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 35px;
            color: #cbd5e1;
            border: 1px solid #334155;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 35px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-weight: 600;
            color: #cbd5e1;
            font-size: 14px;
        }
        .input-group input {
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 30px;
            font-size: 16px;
            color: #f1f5f9;
        }
        .input-group input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
        }
        .mcq-section h3 {
            font-size: 24px;
            color: #f1f5f9;
            margin-bottom: 10px;
        }
        .mcq-note { color: #94a3b8; margin-bottom: 30px; }
        .mcq-block {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }
        .mcq-question {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 20px;
            color: #f1f5f9;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(30, 41, 59, 0.6);
            padding: 12px 22px;
            border-radius: 40px;
            border: 1px solid #334155;
            transition: 0.15s;
            cursor: pointer;
        }
        .option:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
        }
        .option input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #8b5cf6;
        }
        .btn-submit {
            background: linear-gradient(135deg, #8b5cf6, #c084fc);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 20px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
            margin-top: 30px;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            transform: translateY(-3px);
            box-shadow: 0 20px 30px rgba(139, 92, 246, 0.6);
        }
        @media (max-width:700px){ .form-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="apply-card">
        <h1>{{ job.role }}</h1>
        <div class="company-tag">DMless • Knockout hiring</div>
        <div class="desc">{{ job.description }}</div>

        <form method="POST">
            <div class="form-grid">
                <div class="input-group">
                    <label>Full name</label>
                    <input type="text" name="name" placeholder="John Smith" required>
                </div>
                <div class="input-group">
                    <label>Email address</label>
                    <input type="email" name="email" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="mcq-section">
                <h3>🔍 Screening questions</h3>
                <p class="mcq-note">Answer all questions correctly to proceed.</p>

                {% for question in job.questions %}
                <div class="mcq-block">
                    <div class="mcq-question">{{ loop.index }}. {{ question.text }}</div>
                    <div class="options">
                        <label class="option"><input type="radio" name="q{{ question.id }}" value="1" required> {{ question.option1 }}</label>
                        <label class="option"><input type="radio" name="q{{ question.id }}" value="2" required> {{ question.option2 }}</label>
                        <label class="option"><input type="radio" name="q{{ question.id }}" value="3" required> {{ question.option3 }}</label>
                        <label class="option"><input type="radio" name="q{{ question.id }}" value="4" required> {{ question.option4 }}</label>
                    </div>
                </div>
                {% endfor %}
            </div>

            <button type="submit" class="btn-submit">Submit answers</button>
        </form>
    </div>
</body>
</html>
